# Docker Compose configuration for Ds_Virtual_space_micro
# Ds_Virtual_space_micro/docker-compose.yml
version: '3.8'
services:
  auth-service:
    build: ./services/auth-service
    ports:
      - "5001:5001"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./services/auth-service/app:/app

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
